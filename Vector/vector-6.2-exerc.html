<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Mathematics Quest</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin: 0 0 10px 0;
            font-size: 1.4rem;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid #e2e8f0;
        }

        .mode-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        button {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .btn-mode {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-mode.active {
            background: var(--primary);
            color: white;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .btn-next {
            background: #0ea5e9;
            color: white;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
            display: none;
        }

        .btn-next:hover {
            background: #0284c7;
        }

        .question-box {
            font-size: 1.05rem;
            margin: 10px 0;
            padding: 12px;
            border-left: 4px solid var(--primary);
            background: #f8fafc;
            line-height: 1.5;
        }

        .vector-column {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            border-left: 2px solid var(--text);
            border-right: 2px solid var(--text);
            border-radius: 4px;
            padding: 0 4px;
            margin: 0 2px;
        }
        
        .vector-column span {
            padding: 1px 0;
            line-height: 1;
            font-size: 0.95rem;
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .input-row label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            padding: 6px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }

        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .feedback {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: none; /* Controlled cleanly by CSS classes now */
            text-align: center;
            font-size: 0.95rem;
        }

        .feedback.success {
            background-color: #dcfce7;
            color: var(--success);
            display: block;
        }

        .feedback.error {
            background-color: #fee2e2;
            color: var(--error);
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vector Math Training</h1>
    
    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Streak: <span id="streak">0</span> 🔥</span>
        <span>Topic: <span id="topic-name">Random Mix</span></span>
    </div>

    <div class="mode-select">
        <button class="btn-mode active" onclick="setMode('mix', this)">🔀 Mix</button>
        <button class="btn-mode" onclick="setMode(4, this)">📍 Q4-5 Vec</button>
        <button class="btn-mode" onclick="setMode(6, this)">🔍 Q6-7 Coord</button>
        <button class="btn-mode" onclick="setMode(8, this)">⚖️ Q8-9 Equal</button>
    </div>

    <div class="question-box" id="question-display">
        Loading challenge...
    </div>

    <div class="input-container" id="answer-area" onkeypress="handleEnter(event)"></div>

    <button class="btn-submit" id="submit-btn" onclick="checkAnswer()">Verify Answer</button>
    <button class="btn-next" id="next-btn" onclick="generateQuestion()">Next Question ➡️</button>
    
    <div class="feedback" id="feedback-box"></div>
</div>

<script>
    let score = 0;
    let currentStreak = 0;
    let currentMode = 'mix';
    let currentQuestion = {};

    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function randNonZero(min, max) {
        let num = 0;
        while(num === 0) num = rand(min, max);
        return num;
    }

    // Trigger checkAnswer when hitting Enter key
    function handleEnter(e) {
        if (e.key === 'Enter') {
            checkAnswer();
        }
    }

    const generators = {
        type45: function() {
            const type = rand(0, 1) === 0 ? 'AB' : 'QP';
            const x1 = rand(-10, 10);
            const y1 = rand(-10, 10);
            const x2 = rand(-10, 10);
            const y2 = rand(-10, 10);
            
            let ansX, ansY, qText;
            if (type === 'AB') {
                qText = `Given points <b>A(${x1}, ${y1})</b> and <b>B(${x2}, ${y2})</b>, find column vector <span class="vector-column"><span>&rarr;</span><span>AB</span></span>.`;
                ansX = x2 - x1;
                ansY = y2 - y1;
            } else {
                qText = `Given points <b>P(${x1}, ${y1})</b> and <b>Q(${x2}, ${y2})</b>, find column vector <span class="vector-column"><span>&rarr;</span><span>QP</span></span>.`;
                ansX = x1 - x2;
                ansY = y1 - y2;
            }

            return {
                text: qText,
                inputsHTML: `
                    <div class="input-row">Top (x): <input type="number" id="ansX"></div>
                    <div class="input-row">Bottom (y): <input type="number" id="ansY"></div>
                `,
                validate: () => {
                    const elX = document.getElementById('ansX');
                    const elY = document.getElementById('ansY');
                    if(!elX || !elY || elX.value === "" || elY.value === "") return false;
                    return parseInt(elX.value) === ansX && parseInt(elY.value) === ansY;
                },
                solution: `Correct! Matrix elements are [${ansX}, ${ansY}]`
            };
        },

        type67: function() {
            const subtype = rand(1, 3);
            const x1 = rand(-8, 8);
            const y1 = rand(-8, 8);
            const vx = randNonZero(-6, 6);
            const vy = randNonZero(-6, 6);
            const x2 = x1 + vx;
            const y2 = y1 + vy;

            if (subtype === 1) {
                return {
                    text: `If A(${x1}, ${y1}), B(x, y) and <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div>, find <b>x</b> and <b>y</b>.`,
                    inputsHTML: `
                        <div class="input-row">x = <input type="number" id="ansX"></div>
                        <div class="input-row">y = <input type="number" id="ansY"></div>
                    `,
                    validate: () => {
                        const elX = document.getElementById('ansX');
                        const elY = document.getElementById('ansY');
                        if(!elX || !elY || elX.value === "" || elY.value === "") return false;
                        return parseInt(elX.value) === x2 && parseInt(elY.value) === y2;
                    },
                    solution: `Correct! Point B is (${x2}, ${y2})`
                };
            } else if (subtype === 2) {
                return {
                    text: `If A(a, b), B(${x2}, ${y2}) and <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div>, find <b>a</b> and <b>b</b>.`,
                    inputsHTML: `
                        <div class="input-row">a = <input type="number" id="ansA"></div>
                        <div class="input-row">b = <input type="number" id="ansB"></div>
                    `,
                    validate: () => {
                        const elA = document.getElementById('ansA');
                        const elB = document.getElementById('ansB');
                        if(!elA || !elB || elA.value === "" || elB.value === "") return false;
                        return parseInt(elA.value) === x1 && parseInt(elB.value) === y1;
                    },
                    solution: `Correct! Point A is (${x1}, ${y1})`
                };
            } else {
                return {
                    text: `If <span class="vector-column"><span>&rarr;</span><span>PQ</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div> and point P is (${x1}, ${y1}), find coordinates of <b>Q(x, y)</b>.`,
                    inputsHTML: `
                        <div class="input-row">Q_x = <input type="number" id="ansX"></div>
                        <div class="input-row">Q_y = <input type="number" id="ansY"></div>
                    `,
                    validate: () => {
                        const elX = document.getElementById('ansX');
                        const elY = document.getElementById('ansY');
                        if(!elX || !elY || elX.value === "" || elY.value === "") return false;
                        return parseInt(elX.value) === x2 && parseInt(elY.value) === y2;
                    },
                    solution: `Correct! Point Q is (${x2}, ${y2})`
                };
            }
        },

        type89: function() {
            const subtype = rand(1, 2);
            
            if (subtype === 1) {
                const isTrue = rand(0, 1) === 1;
                const ax = rand(-5,5), ay = rand(-5,5);
                const bx = rand(-5,5), by = rand(-5,5);
                const vectorAB_x = bx - ax;
                const vectorAB_y = by - ay;

                let cx = rand(-5,5), cy = rand(-5,5);
                let dx, dy;
                
                if (isTrue) {
                    dx = cx + vectorAB_x;
                    dy = cy + vectorAB_y;
                } else {
                    dx = cx + vectorAB_x + randNonZero(-2, 2);
                    dy = cy + vectorAB_y + randNonZero(-2, 2);
                }

                return {
                    text: `Given points <b>D(${ax}, ${ay}), R(${bx}, ${by}), S(${cx}, ${cy}), T(${dx}, ${dy})</b>, is <span class="vector-column"><span>&rarr;</span><span>DR</span></span> = <span class="vector-column"><span>&rarr;</span><span>ST</span></span>?`,
                    inputsHTML: `
                        <div class="input-row"><label><input type="radio" name="equality" value="yes"> Yes, they are equal</label></div>
                        <div class="input-row"><label><input type="radio" name="equality" value="no"> No, they are not equal</label></div>
                    `,
                    validate: () => {
                        const selected = document.querySelector('input[name="equality"]:checked');
                        if(!selected) return false;
                        return (selected.value === 'yes') === isTrue;
                    },
                    solution: isTrue ? `Correct! Both equal [${vectorAB_x}, ${vectorAB_y}]` : "Correct! Components do not match."
                };
            } else {
                const ax = rand(-5,5), ay = rand(-5,5);
                const bx = rand(-5,5), by = rand(-5,5);
                const vx = bx - ax;
                const vy = by - ay;

                const target_a = rand(-5, 5);
                const target_b = rand(-5, 5);

                const dx = target_a + vx;
                const cy = target_b - vy;

                return {
                    text: `If A(${ax}, ${ay}), B(${bx}, ${by}), C(a, ${cy}), and D(${dx}, b) such that <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <span class="vector-column"><span>&rarr;</span><span>CD</span></span>, find <b>a</b> and <b>b</b>.`,
                    inputsHTML: `
                        <div class="input-row">a = <input type="number" id="ansA"></div>
                        <div class="input-row">b = <input type="number" id="ansB"></div>
                    `,
                    validate: () => {
                        const elA = document.getElementById('ansA');
                        const elB = document.getElementById('ansB');
                        if(!elA || !elB || elA.value === "" || elB.value === "") return false;
                        return parseInt(elA.value) === target_a && parseInt(elB.value) === target_b;
                    },
                    solution: `Correct! a = ${target_a}, b = ${target_b}`
                };
            }
        }
    };

    function setMode(mode, element) {
        currentMode = mode;
        document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        const modeNames = { 'mix': 'Random Mix', 4: 'Q4-5 Vectors', 6: 'Q6-7 Coordinates', 8: 'Q8-9 Equality' };
        document.getElementById('topic-name').innerText = modeNames[mode];
        
        generateQuestion();
    }

    function generateQuestion() {
        const fb = document.getElementById('feedback-box');
        
        // This line removes any bad inline styles so CSS can work again!
        fb.removeAttribute('style');
        fb.className = 'feedback'; 
        
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';

        let activePool = currentMode;
        if (currentMode === 'mix') {
            const pools = [4, 6, 8];
            activePool = pools[Math.floor(Math.random() * pools.length)];
        }

        if (activePool === 4) currentQuestion = generators.type45();
        else if (activePool === 6) currentQuestion = generators.type67();
        else if (activePool === 8) currentQuestion = generators.type89();

        document.getElementById('question-display').innerHTML = currentQuestion.text;
        document.getElementById('answer-area').innerHTML = currentQuestion.inputsHTML;

        // Auto-focus the first input box to save the user a click
        const firstInput = document.querySelector('#answer-area input');
        if(firstInput) firstInput.focus();
    }

    function checkAnswer() {
        const fb = document.getElementById('feedback-box');
        
        if (currentQuestion.validate()) {
            score += 10;
            currentStreak += 1;
            fb.innerHTML = currentQuestion.solution || "Outstanding! Correct Answer.";
            fb.className = "feedback success";
            
            document.getElementById('score').innerText = score;
            document.getElementById('streak').innerText = currentStreak;
            
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').focus(); // Auto-focus the next button
        } else {
            currentStreak = 0;
            fb.innerHTML = "Incorrect answer or empty fields. Try again!";
            fb.className = "feedback error";
            document.getElementById('streak').innerText = currentStreak;
        }
    }

    // Load the first question
    generateQuestion();
</script>

</body>
</html>
