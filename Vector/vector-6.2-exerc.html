<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Mathematics Quest</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-top: 0;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .mode-select {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-mode {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-mode.active {
            background: var(--primary);
            color: white;
        }

        .btn-submit {
            background: var(--primary);
            color: white;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
        }

        .question-box {
            font-size: 1.3rem;
            margin: 20px 0;
            padding: 20px;
            border-left: 5px solid var(--primary);
            background: #f8fafc;
            line-height: 1.6;
        }

        /* Vector formatting */
        .vector-column {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            border-left: 2px solid var(--text);
            border-right: 2px solid var(--text);
            border-radius: 6px;
            padding: 0 6px;
            margin: 0 4px;
        }
        .vector-column span {
            padding: 2px 0;
            line-height: 1;
        }

        .input-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
        }

        input[type="number"] {
            width: 70px;
            padding: 8px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1.1rem;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            text-align: center;
        }

        .feedback.success {
            background-color: #dcfce7;
            color: var(--success);
            display: block;
        }

        .feedback.error {
            background-color: #fee2e2;
            color: var(--error);
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vector Mathematics Quest</h1>
    
    <div class="stats-bar">
        <span>Score: <span id="score">0</span></span>
        <span>Streak: <span id="streak">0</span> 🔥</span>
        <span>Topic: <span id="topic-name">Random Mix</span></span>
    </div>

    <div class="mode-select">
        <button class="btn-mode active" onclick="setMode('mix', this)">🔀 Random Mix</button>
        <button class="btn-mode" onclick="setMode(4, this)">📍 Component Vectors (Q4-5)</button>
        <button class="btn-mode" onclick="setMode(6, this)">🔍 Find Missing Coords (Q6-7)</button>
        <button class="btn-mode" onclick="setMode(8, this)">⚖️ Vector Equality (Q8-9)</button>
    </div>

    <div class="question-box" id="question-display">
        Loading challenge...
    </div>

    <div class="input-container" id="answer-area">
        </div>

    <button class="btn-submit" onclick="checkAnswer()">Verify Answer</button>
    
    <div class="feedback" id="feedback-box"></div>
</div>

<script>
    let score = 0;
    let currentStreak = 0;
    let currentMode = 'mix';
    let currentQuestion = {};

    // Helper functions for random numbers
    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    function randNonZero(min, max) {
        let num = 0;
        while(num === 0) num = rand(min, max);
        return num;
    }

    // Question generators matching textbook types
    const generators = {
        // Types 4 & 5: Find vector from 2 points
        type45: function() {
            const type = rand(0, 1) === 0 ? 'AB' : 'QP';
            const x1 = rand(-10, 10);
            const y1 = rand(-10, 10);
            const x2 = rand(-10, 10);
            const y2 = rand(-10, 10);
            
            let ansX, ansY, qText;
            if (type === 'AB') {
                qText = `Given points <b>A(${x1}, ${y1})</b> and <b>B(${x2}, ${y2})</b>, find the components of the column vector <span class="vector-column"><span>&rarr;</span><span>AB</span></span>.`;
                ansX = x2 - x1;
                ansY = y2 - y1;
            } else {
                qText = `Given points <b>P(${x1}, ${y1})</b> and <b>Q(${x2}, ${y2})</b>, find the components of the column vector <span class="vector-column"><span>&rarr;</span><span>QP</span></span>.`;
                ansX = x1 - x2; // P - Q
                ansY = y1 - y2;
            }

            return {
                text: qText,
                inputsHTML: `
                    <div class="input-row">
                        x-component (top): <input type="number" id="ansX">
                    </div>
                    <div class="input-row">
                        y-component (bottom): <input type="number" id="ansY">
                    </div>
                `,
                validate: () => {
                    return parseInt(document.getElementById('ansX').value) === ansX &&
                           parseInt(document.getElementById('ansY').value) === ansY;
                },
                solution: `Correct! x = ${ansX}, y = ${ansY}`
            };
        },

        // Types 6 & 7: Find missing coordinate given vector and point
        type67: function() {
            const subtype = rand(1, 3);
            const x1 = rand(-8, 8);
            const y1 = rand(-8, 8);
            const vx = randNonZero(-6, 6);
            const vy = randNonZero(-6, 6);
            // End points
            const x2 = x1 + vx;
            const y2 = y1 + vy;

            if (subtype === 1) {
                // Find missing x and y at terminal point
                return {
                    text: `If A(${x1}, ${y1}), B(x, y) and <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div>, find the values of <b>x</b> and <b>y</b>.`,
                    inputsHTML: `
                        <div class="input-row">x = <input type="number" id="ansX"></div>
                        <div class="input-row">y = <input type="number" id="ansY"></div>
                    `,
                    validate: () => {
                        return parseInt(document.getElementById('ansX').value) === x2 &&
                               parseInt(document.getElementById('ansY').value) === y2;
                    },
                    solution: `Correct! B = (${x2}, ${y2})`
                };
            } else if (subtype === 2) {
                // Find initial point variable coordinates A(a, b)
                return {
                    text: `If A(a, b), B(${x2}, ${y2}) and <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div>, find the values of <b>a</b> and <b>b</b>.`,
                    inputsHTML: `
                        <div class="input-row">a = <input type="number" id="ansA"></div>
                        <div class="input-row">b = <input type="number" id="ansB"></div>
                    `,
                    validate: () => {
                        return parseInt(document.getElementById('ansA').value) === x1 &&
                               parseInt(document.getElementById('ansB').value) === y1;
                    },
                    solution: `Correct! A = (${x1}, ${y1})`
                };
            } else {
                // Find coordinate Q given vector PQ and point P
                return {
                    text: `If <span class="vector-column"><span>&rarr;</span><span>PQ</span></span> = <div class="vector-column"><span>${vx}</span><span>${vy}</span></div> and the coordinates of P are (${x1}, ${y1}), find the coordinates of <b>Q(x, y)</b>.`,
                    inputsHTML: `
                        <div class="input-row">Q_x = <input type="number" id="ansX"></div>
                        <div class="input-row">Q_y = <input type="number" id="ansY"></div>
                    `,
                    validate: () => {
                        return parseInt(document.getElementById('ansX').value) === x2 &&
                               parseInt(document.getElementById('ansY').value) === y2;
                    },
                    solution: `Correct! Q = (${x2}, ${y2})`
                };
            }
        },

        // Types 8 & 9: Vector equality and proving equivalence
        type89: function() {
            const subtype = rand(1, 2);
            
            if (subtype === 1) {
                // Verification/Proof logic simulation
                const isTrue = rand(0, 1) === 1;
                const ax = rand(-5,5), ay = rand(-5,5);
                const bx = rand(-5,5), by = rand(-5,5);
                const vectorAB_x = bx - ax;
                const vectorAB_y = by - ay;

                let cx = rand(-5,5), cy = rand(-5,5);
                let dx, dy;
                
                if (isTrue) {
                    dx = cx + vectorAB_x;
                    dy = cy + vectorAB_y;
                } else {
                    dx = cx + vectorAB_x + randNonZero(-2, 2);
                    dy = cy + vectorAB_y + randNonZero(-2, 2);
                }

                return {
                    text: `Determine if vector equality holds true: Given points <b>D(${ax}, ${ay}), R(${bx}, ${by}), S(${cx}, ${cy}), T(${dx}, ${dy})</b>, is <span class="vector-column"><span>&rarr;</span><span>DR</span></span> = <span class="vector-column"><span>&rarr;</span><span>ST</span></span>?`,
                    inputsHTML: `
                        <div class="input-row">
                            <label><input type="radio" name="equality" value="yes"> Yes, they are equal</label>
                        </div>
                        <div class="input-row">
                            <label><input type="radio" name="equality" value="no"> No, they are not equal</label>
                        </div>
                    `,
                    validate: () => {
                        const selected = document.querySelector('input[name="equality"]:checked');
                        if(!selected) return false;
                        return (selected.value === 'yes') === isTrue;
                    },
                    solution: isTrue ? "Correct! Both vectors equal [" + vectorAB_x + ", " + vectorAB_y + "]" : "Correct! The components do not match."
                };
            } else {
                // Algebra puzzle style (Q9) Find values of a and b given vector equality AB = CD
                const ax = rand(-5,5), ay = rand(-5,5);
                const bx = rand(-5,5), by = rand(-5,5);
                const vx = bx - ax;
                const vy = by - ay;

                // C(a, 4), D(6, b) styles simplified cleanly:
                const cx_base = rand(-5,5);
                const dy_base = rand(-5,5);

                // If AB = CD -> dx - a = vx -> a = dx - vx
                // dy - cy = vy -> b = cy + vy
                const target_a = rand(-5, 5);
                const target_b = rand(-5, 5);

                const dx = target_a + vx;
                const cy = target_b - vy;

                return {
                    text: `If A(${ax}, ${ay}), B(${bx}, ${by}), C(a, ${cy}), and D(${dx}, b) such that <span class="vector-column"><span>&rarr;</span><span>AB</span></span> = <span class="vector-column"><span>&rarr;</span><span>CD</span></span>, find the values of <b>a</b> and <b>b</b>.`,
                    inputsHTML: `
                        <div class="input-row">a = <input type="number" id="ansA"></div>
                        <div class="input-row">b = <input type="number" id="ansB"></div>
                    `,
                    validate: () => {
                        return parseInt(document.getElementById('ansA').value) === target_a &&
                               parseInt(document.getElementById('ansB').value) === target_b;
                    },
                    solution: `Correct! a = ${target_a}, b = ${target_b}`
                };
            }
        }
    };

    function setMode(mode, element) {
        currentMode = mode;
        document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        
        const modeNames = { 'mix': 'Random Mix', 4: 'Component Vectors', 6: 'Find Missing Coords', 8: 'Vector Equality' };
        document.getElementById('topic-name').innerText = modeNames[mode];
        
        generateQuestion();
    }

    function generateQuestion() {
        // Clear old feedback
        const fb = document.getElementById('feedback-box');
        fb.className = 'feedback';
        fb.innerText = '';

        let activePool = currentMode;
        if (currentMode === 'mix') {
            const pools = [4, 6, 8];
            activePool = pools[Math.floor(Math.random() * pools.length)];
        }

        if (activePool === 4) currentQuestion = generators.type45();
        else if (activePool === 6) currentQuestion = generators.type67();
        else if (activePool === 8) currentQuestion = generators.type89();

        document.getElementById('question-display').innerHTML = currentQuestion.text;
        document.getElementById('answer-area').innerHTML = currentQuestion.inputsHTML;
    }

    function checkAnswer() {
        const fb = document.getElementById('feedback-box');
        try {
            if (currentQuestion.validate()) {
                score += 10;
                currentStreak += 1;
                fb.innerText = currentQuestion.solution || "Outstanding! Correct Answer.";
                fb.className = "feedback success";
                document.getElementById('score').innerText = score;
                document.getElementById('streak').innerText = currentStreak;
                
                // Load next question automatically after short delay
                setTimeout(generateQuestion, 2000);
            } else {
                currentStreak = 0;
                fb.innerText = "Incorrect. Check your calculations and try again!";
                fb.className = "feedback error";
                document.getElementById('streak').innerText = currentStreak;
            }
        } catch(e) {
            fb.innerText = "Please input valid numerical answers.";
            fb.className = "feedback error";
        }
    }

    // Initialize first question
    generateQuestion();
</script>

</body>
</html>
