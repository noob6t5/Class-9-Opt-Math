<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Order Finder</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --highlight: #22d3ee;
            --accent: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: var(--card);
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #334155;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .mnemonic-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-align: center;
        }

        .order-lab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: #0f172a;
            padding: 30px;
            border-radius: 12px;
        }

        .matrix-preview {
            display: grid;
            gap: 10px;
            padding: 20px;
            border-left: 4px solid var(--primary);
            border-right: 4px solid var(--primary);
            transition: 0.3s;
        }

        .cell {
            width: 50px;
            height: 50px;
            background: var(--card);
            border: 1px solid #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 60px;
            padding: 8px;
            background: #1e293b;
            border: 1px solid var(--primary);
            color: white;
            text-align: center;
            border-radius: 5px;
            font-size: 1.1rem;
        }

        .order-result {
            margin-top: 20px;
            font-size: 1.5rem;
            color: var(--highlight);
            font-weight: bold;
        }

        .formula {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--highlight);">Find the Order of a Matrix</h2>
    
    <div class="mnemonic-box">
        <strong>Row (रो)  :  रुँदा आँसु कसरी पुछिन्छ?  </strong> (तेर्सो लाइन ↔ = ROW)<br>
        Always count Rows first, then Columns!
    </div>

    <div class="order-lab">
        <div id="matrix-grid" class="matrix-preview">
            </div>

        <div class="controls">
            <div class="control-group">
                <label>Rows (i)</label>
                <input type="number" id="rowVal" value="2" min="1" max="5" oninput="drawMatrix()">
            </div>
            <div style="font-size: 2rem; align-self: flex-end;">×</div>
            <div class="control-group">
                <label>Columns (j)</label>
                <input type="number" id="colVal" value="3" min="1" max="5" oninput="drawMatrix()">
            </div>
        </div>

        <div class="order-result" id="orderText">Order: 2 × 3</div>
        <div class="formula" id="totalText">Total elements: 6</div>
    </div>

    <div style="margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">
        <p><strong>Method:</strong><br>
        1. Count horizontal lines (Row)<br>
        2. Count vertical lines (Column)<br>
        3. Write as <i>Row × Column</i></p>
    </div>
</div>

<script>
    function drawMatrix() {
        const rows = document.getElementById('rowVal').value;
        const cols = document.getElementById('colVal').value;
        const grid = document.getElementById('matrix-grid');
        
        grid.style.gridTemplateColumns = `repeat(${cols}, 50px)`;
        grid.innerHTML = '';

        for (let i = 1; i <= rows; i++) {
            for (let j = 1; j <= cols; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerHTML = `a<sub>${i}${j}</sub>`;
                grid.appendChild(cell);
            }
        }

        document.getElementById('orderText').innerText = `Order: ${rows} × ${cols}`;
        document.getElementById('totalText').innerText = `Total elements: ${rows * cols}`;
    }

    // Initial draw
    drawMatrix();
</script>

</body>
</html>
