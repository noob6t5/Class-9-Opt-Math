<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function Types: Lab & Quiz</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg); margin: 0; padding: 20px; }
        .mode-selector { margin-bottom: 20px; background: white; padding: 15px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .mode-btn { padding: 10px 25px; font-size: 1.1rem; cursor: pointer; border: 2px solid var(--primary); background: white; color: var(--primary); font-weight: bold; border-radius: 5px; }
        .mode-btn.active { background: var(--primary); color: white; }
        .container { display: flex; justify-content: center; gap: 120px; margin-top: 60px; position: relative; height: 350px; }
        .set { width: 160px; height: 300px; border: 4px solid var(--primary); border-radius: 40px; background: white; display: flex; flex-direction: column; justify-content: space-around; align-items: center; position: relative; z-index: 2;}
        .label { position: absolute; top: -40px; font-weight: bold; color: var(--primary); font-size: 1.1rem; width: 180px;}
        .element { width: 50px; height: 50px; border-radius: 50%; background: #3498db; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; }
        svg { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 1; top: 0; left: 0; }
        .controls { margin-top: 30px; min-height: 150px; }
        button { margin: 5px; padding: 12px 20px; cursor: pointer; font-size: 1rem; border-radius: 8px; border: 1px solid #ccc; background: white; }
        .opt-btn { background: #fff; border: 2px solid var(--primary); font-weight: bold; }
        .action-btn { background: var(--success); color: white; border: none; font-weight: bold; }
        .reason-btn { background: #9b59b6; color: white; border: none; font-weight: bold; display: none; }
        .info-box { margin-top: 15px; font-size: 1.3rem; font-weight: bold; color: var(--primary); min-height: 40px; }
        #reasonText { margin-top: 10px; color: #555; font-style: italic; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.4;}
        .correct { color: var(--success); }
        .wrong { color: var(--accent); }
    </style>
</head>
<body>

    <div class="mode-selector">
        <button id="btnLearn" class="mode-btn active" onclick="setMode('learn')">LEARNING MODE</button>
        <button id="btnQuiz" class="mode-btn" onclick="setMode('quiz')">QUIZ MODE</button>
    </div>

    <h2 id="mainHeading">Mapping: Learn the Types</h2>

    <div class="container" id="box">
        <svg id="svg">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                    <polygon points="0 0, 10 5, 0 10" fill="red"/>
                </marker>
            </defs>
        </svg>

        <div class="set">
            <div class="label">Domain (Set A)</div>
            <div class="element" id="a1">1</div>
            <div class="element" id="a2">2</div>
            <div class="element" id="a3">3</div>
        </div>

        <div class="set">
            <div class="label">Codomain (Set B)</div>
            <div class="element" id="b1">x</div>
            <div class="element" id="b2">y</div>
            <div class="element" id="b3">z</div>
        </div>
    </div>

    <div class="controls">
        <div id="learnControls">
            <button onclick="show('oneone')">One-to-One</button>
            <button onclick="show('manyone')">Many-to-One</button>
            <button onclick="show('into')">Into Function</button>
            <button onclick="show('onto')">Onto Function</button>
        </div>

        <div id="quizControls" style="display:none;">
            <button class="action-btn" onclick="generateQuiz()">Next Question</button>
            <p>What type is this?</p>
            <button class="opt-btn" onclick="check('oneone')">One-to-One</button>
            <button class="opt-btn" onclick="check('manyone')">Many-One</button>
            <button class="opt-btn" onclick="check('into')">Into</button>
            <button class="opt-btn" onclick="check('onto')">Onto</button>
        </div>

        <div class="info-box" id="info">Select a type below</div>
        <button id="btnReason" class="reason-btn" onclick="toggleReason()">Show Reason</button>
        <div id="reasonText"></div>
    </div>

<script>
    let currentMode = 'learn';
    let correctAnswer = '';
    let currentType = 'oneone'; // State to keep track of what is currently drawn
    
    const explanations = {
        'oneone': "ONE-TO-ONE: Every input has its own separate partner. (प्रत्येक Input को छुट्टाछुट्टै Image छ।)",
        'manyone': "MANY-ONE: More than one input shares the same image. (दुई वा सोभन्दा बढी Input को एउटै Image छ।)",
        'into': "INTO: There's an empty element in Set B with no partner. (Set B मा कम्तिमा एउटा यस्तो Element छ जसको कुनै Pre-image छैन।)",
        'onto': "ONTO: Every element in Set B has a partner. No one is left out. (Set B का सबै Element को Pre-image छ। कोहि पनि खाली छैन।)"
    };

    function setMode(m) {
        currentMode = m;
        document.getElementById('btnLearn').classList.toggle('active', m === 'learn');
        document.getElementById('btnQuiz').classList.toggle('active', m === 'quiz');
        document.getElementById('learnControls').style.display = (m === 'learn') ? 'block' : 'none';
        document.getElementById('quizControls').style.display = (m === 'quiz') ? 'block' : 'none';
        
        if (m === 'quiz') {
            generateQuiz();
        } else {
            reset();
            hideReason();
            show('oneone');
            document.getElementById('info').innerHTML = "Select a type below";
        }
    }

    function reset(){
        const svg = document.getElementById("svg");
        // Clear previous lines but keep the arrow definition
        svg.innerHTML = `
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
                    <polygon points="0 0, 10 5, 0 10" fill="red"/>
                </marker>
            </defs>`;
    }

    function line(a,b){
        const svg = document.getElementById("svg");
        const box = document.getElementById("box");
        
        const elA = document.getElementById(a);
        const elB = document.getElementById(b);
        
        const rectA = elA.getBoundingClientRect();
        const rectB = elB.getBoundingClientRect();
        const rectSVG = svg.getBoundingClientRect();

        // Calculate coordinates relative to the SVG element
        let x1 = rectA.right - rectSVG.left; 
        let y1 = (rectA.top + rectA.height/2) - rectSVG.top;
        let x2 = rectB.left - rectSVG.left; 
        let y2 = (rectB.top + rectB.height/2) - rectSVG.top;

        let l = document.createElementNS("http://www.w3.org/2000/svg","line");
        l.setAttribute("x1",x1); 
        l.setAttribute("y1",y1);
        l.setAttribute("x2",x2); 
        l.setAttribute("y2",y2);
        l.setAttribute("stroke","red"); 
        l.setAttribute("stroke-width","3");
        l.setAttribute("marker-end","url(#arrow)");
        svg.appendChild(l);
    }

    function show(type) {
        currentType = type; // Store the type for redrawing
        reset();
        if(type==="oneone"){ line("a1","b1"); line("a2","b2"); line("a3","b3"); }
        if(type==="manyone"){ line("a1","b1"); line("a2","b1"); line("a3","b2"); }
        if(type==="into"){ line("a1","b1"); line("a2","b2"); line("a3","b2"); }
        if(type==="onto"){ line("a1","b1"); line("a2","b3"); line("a3","b2"); }
        
        if(currentMode === 'learn') document.getElementById('info').innerText = explanations[type];
    }

    // FIX: Listen for window resize or zoom events and redraw
    window.addEventListener('resize', () => {
        show(currentType);
    });

    function generateQuiz() {
        hideReason();
        const types = ['oneone', 'manyone', 'into', 'onto'];
        correctAnswer = types[Math.floor(Math.random() * types.length)];
        show(correctAnswer);
        document.getElementById('info').innerHTML = "What type of mapping is shown above?";
    }

    function check(ans) {
        const info = document.getElementById('info');
        if(ans === correctAnswer) {
            info.innerHTML = "<span class='correct'>✔ Correct! सही उत्तर!</span>";
            hideReason();
        } else {
            info.innerHTML = "<span class='wrong'>✘ Wrong Answer. गलत भयो।</span>";
            document.getElementById('btnReason').style.display = 'inline-block';
        }
    }

    function toggleReason() {
        const rText = document.getElementById('reasonText');
        if(rText.innerHTML === "") {
            rText.innerHTML = "<b>Reason:</b> " + explanations[correctAnswer];
            document.getElementById('btnReason').innerText = "Hide Reason";
        } else {
            hideReason();
        }
    }

    function hideReason() {
        document.getElementById('reasonText').innerHTML = "";
        document.getElementById('btnReason').style.display = 'none';
        document.getElementById('btnReason').innerText = "Show Reason";
    }

    window.onload = () => show('oneone');
</script>
</body>
</html>
